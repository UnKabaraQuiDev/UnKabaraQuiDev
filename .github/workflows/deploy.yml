name: Deploy

on:
  workflow_dispatch: 
  push:
    branches:
      - pages

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            set -e

            mkdir -p /var/www
            cd /var/www

            if [ ! -d "UnKabaraQuiDev/.git" ]; then
              rm -rf UnKabaraQuiDev

              git clone \
                --branch pages \
                https://${{ secrets.GH_PAT }}@github.com/YOUR_USERNAME/YOUR_REPO.git \
                UnKabaraQuiDev
            fi

            cd /var/www/UnKabaraQuiDev

            git fetch origin
            git checkout pages
            git reset --hard origin/pages
