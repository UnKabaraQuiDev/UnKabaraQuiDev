name: Update activity graphs

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-activity:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: pages
          fetch-depth: 0

      - name: Check for commits in last 26h
        id: changes
        if: github.event_name == 'schedule'
        run: |
          LOG_OUTPUT=$(git log \
            --since='26 hours ago' \
            --oneline \
            -- . ':(exclude).github/**' \
            | grep -v '\[bot\]' \
            | grep -v 'github-actions' \
            | grep -v '^\[NIGHTLY\]' \
            | grep -v '^ci:' \
            || true)

          echo "Git log output:"
          echo "$LOG_OUTPUT"

          if echo "$LOG_OUTPUT" | grep -q .; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - run: npm install cheerio

      - name: Generate activity graphs
        run: node node/generate-activity.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated graphs and sitemap
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/assets/activity
          git add docs/sitemap.xml sitemap.xml 2>/dev/null || true

          git commit -m "ci: Update activity graphs and sitemap" || exit 0
          git push
