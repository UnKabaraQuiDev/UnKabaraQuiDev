
name: Update activity graphs

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-activity:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          branch: pages

      - name: Generate activity graphs
        run: node scripts/generate-activity.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated graphs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add assets/activity
          git commit -m "Update activity graphs" || exit 0
          git push